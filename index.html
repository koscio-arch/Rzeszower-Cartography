<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet OSM + Local Tiles Overlay</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Ensure referrer is sent (important for OSM) -->
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    /* Opacity slider container */
    .opacity-control {
      background: white;
      padding: 8px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  /* ----------------------------------
     1. Initialize the map
     ---------------------------------- */
  const map = L.map('map', {
    center: [49.9538, 22.1002], // Poland
    zoom: 14,
    minZoom: 8,
    maxZoom: 18
  });

  /* ----------------------------------
     2. OpenStreetMap (ALWAYS ON)
     ---------------------------------- */
  const background = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors, © CARTO'
    }
  ).addTo(map); // ✅ always on

  /* ----------------------------------
     3. Local tiles (overlay)
     ---------------------------------- */
  const localTiles = L.tileLayer('borek_tiles/{z}/{x}/{y}.png', {
    minZoom: 12,
    maxZoom: 18,
    opacity: 0.8, // starting transparency
    attribution: '© Archiwum Państwowe w Przemyślu'
  }).addTo(map); // start ON (can be toggled)
  
  const regionLayer = L.geoJSON(null, {
   style: {
    color: "black",
    weight: 2,
    opacity: 1,
    dashArray: "6, 6",
    fillOpacity: 0
   },

   onEachFeature: function (feature, layer) {
    if (feature.properties && feature.properties.name) {
      layer.bindPopup(feature.properties.name);
    }
   }
  }).addTo(map);

  fetch('data/kosciolek_region.geojson')
   .then(response => response.json())
   .then(data => {
     regionLayer.addData(data);
     map.fitBounds(regionLayer.getBounds());
   })
   .catch(error => {
     console.error("Error loading GeoJSON:", error);
   });

  /* ----------------------------------
     4. Layer control (overlay only)
     ---------------------------------- */
  L.control.layers(
    null, // no base-layer switcher
    {
      "Borek Stary (1851)": localTiles,
      "Kosciolek Alphabetisches Verzeichnis": regionLayer
    },
    { collapsed: false }
  ).addTo(map);

  /* ----------------------------------
     5. Opacity slider control
     ---------------------------------- */
  const opacityControl = L.control({ position: 'topright' });

  opacityControl.onAdd = function () {
    const div = L.DomUtil.create('div', 'opacity-control');

    div.innerHTML = `
      <label>
        overlay opacity<br>
        <input
          type="range"
          min="0"
          max="1"
          step="0.05"
          value="0.8"
          id="opacityRange"
        >
      </label>
    `;

    // Prevent map dragging when interacting with slider
    L.DomEvent.disableClickPropagation(div);

    return div;
  };

  opacityControl.addTo(map);

  /* ----------------------------------
     6. Hook slider to tile opacity
     ---------------------------------- */
  document.addEventListener('input', function (e) {
    if (e.target && e.target.id === 'opacityRange') {
      localTiles.setOpacity(e.target.value);
    }
  });
</script>

</body>
</html>
